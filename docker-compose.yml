version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: parking_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parking_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parking_pass}
      POSTGRES_DB: ${POSTGRES_DB:-parking_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-parking_user} -d $${POSTGRES_DB:-parking_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: parking_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: parking_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-parking_user}:${POSTGRES_PASSWORD:-parking_pass}@postgres:5432/${POSTGRES_DB:-parking_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Comma-separated list of allowed frontend origins.
      # Override in production: CORS_ALLOWED_ORIGINS=https://your-app.example.com
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173}


    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  expiry_worker:
    build: ./backend
    container_name: parking_expiry_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-parking_user}:${POSTGRES_PASSWORD:-parking_pass}@postgres:5432/${POSTGRES_DB:-parking_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python expiry_worker.py

volumes:
  postgres_data:
