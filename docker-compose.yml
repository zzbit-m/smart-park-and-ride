version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: parking_postgres
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: parking_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: parking_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://parking_user:parking_pass@postgres:5432/parking_db
      REDIS_URL: redis://redis:6379
      ADMIN_USERNAME: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Comma-separated list of allowed frontend origins.
      # Override in production: CORS_ALLOWED_ORIGINS=https://your-app.example.com
      CORS_ALLOWED_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173"


    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
